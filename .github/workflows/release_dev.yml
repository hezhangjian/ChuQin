name: Release Dev Build

on:
  push:
    branches:
      - dev
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-dev-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release_dev:
    name: Build And Release Windows Dev Package
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build ChuQin for Windows
        run: pnpm tauri build --bundles nsis

      - name: Prepare release assets
        id: prepare_release_assets
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release-assets | Out-Null
          Get-ChildItem target/release
          Get-ChildItem target/release/bundle/nsis
          Copy-Item target/release/chuqin.exe release-assets/chuqin-dev.exe
          Copy-Item target/release/bundle/nsis/*.exe release-assets/
          $files = (Get-ChildItem release-assets/*.exe | ForEach-Object { $_.FullName }) -join ","
          "release_files=$files" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Publish latest dev release
        uses: hezhangjian/latest-release-action@v1
        with:
          tag_name: dev-latest
          release_name: ChuQin Dev Latest
          files: ${{ steps.prepare_release_assets.outputs.release_files }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
